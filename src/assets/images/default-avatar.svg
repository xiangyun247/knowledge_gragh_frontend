<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="95" fill="rgba(0, 212, 255, 0.1)" />
  
  <!-- 头像轮廓 -->
  <circle cx="100" cy="80" r="40" fill="rgba(0, 212, 255, 0.3)" stroke="rgba(0, 212, 255, 0.6)" stroke-width="2" />
  
  <!-- 身体部分 -->
  <rect x="70" y="120" width="60" height="60" rx="30" fill="rgba(0, 212, 255, 0.2)" stroke="rgba(0, 212, 255, 0.5)" stroke-width="2" />
  
  <!-- 眼睛 -->
  <circle cx="85" cy="75" r="5" fill="rgba(0, 212, 255, 0.8)" />
  <circle cx="115" cy="75" r="5" fill="rgba(0, 212, 255, 0.8)" />
  
  <!-- 嘴巴 -->
  <path d="M 85 90 Q 100 100 115 90" stroke="rgba(0, 212, 255, 0.6)" stroke-width="2" fill="none" />
  
  <!-- 光晕效果 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(0, 212, 255, 0.2)" stroke-width="2" opacity="0.6" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(0, 212, 255, 0.1)" stroke-width="2" opacity="0.4" />
</svg>